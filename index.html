<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Management System - Frontend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-insert {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-insert:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-update {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-update:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .vehicle-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .vehicle-item strong {
            color: #667eea;
        }
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚗 Vehicle Management System</h1>
        <p>Frontend Interface - Student ID: 2400030965</p>
    </div>

    <div class="container">
        <!-- Insert Vehicle Card -->
        <div class="card">
            <h2>➕ I. Insert New Vehicle</h2>
            <form id="insertForm">
                <div class="form-group">
                    <label>Vehicle Name</label>
                    <input type="text" id="insertName" placeholder="e.g., Toyota Camry" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="insertDescription" placeholder="e.g., Sedan car with excellent features" required>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="insertDate" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="insertStatus" required>
                        <option value="">Select Status</option>
                        <option value="Available">Available</option>
                        <option value="In Use">In Use</option>
                        <option value="Maintenance">Maintenance</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
                <button type="submit" class="btn-insert">Insert Vehicle</button>
            </form>
            <div id="insertResult" class="result"></div>
        </div>

        <!-- Update Vehicle Card -->
        <div class="card">
            <h2>✏️ II. Update Vehicle</h2>
            <form id="updateForm">
                <div class="form-group">
                    <label>Vehicle ID</label>
                    <input type="number" id="updateId" placeholder="Enter vehicle ID" required min="1">
                </div>
                <div class="form-group">
                    <label>New Name</label>
                    <input type="text" id="updateName" placeholder="Enter new name" required>
                </div>
                <div class="form-group">
                    <label>New Status</label>
                    <select id="updateStatus" required>
                        <option value="">Select Status</option>
                        <option value="Available">Available</option>
                        <option value="In Use">In Use</option>
                        <option value="Maintenance">Maintenance</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
                <button type="submit" class="btn-update">Update Vehicle</button>
            </form>
            <div id="updateResult" class="result"></div>
        </div>
    </div>

    <script>
        // Simulated vehicle storage (in-memory database)
        let vehicles = [];
        let nextId = 1;

        // Set today's date as default
        document.getElementById('insertDate').valueAsDate = new Date();

        // Insert Vehicle Form Handler
        document.getElementById('insertForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const vehicle = {
                id: nextId++,
                name: document.getElementById('insertName').value,
                description: document.getElementById('insertDescription').value,
                date: document.getElementById('insertDate').value,
                status: document.getElementById('insertStatus').value
            };
            
            vehicles.push(vehicle);
            
            const resultDiv = document.getElementById('insertResult');
            resultDiv.className = 'result success';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <strong>✅ Vehicle Inserted Successfully!</strong><br>
                <div class="vehicle-item" style="margin-top: 10px;">
                    <strong>ID:</strong> ${vehicle.id}<br>
                    <strong>Name:</strong> ${vehicle.name}<br>
                    <strong>Description:</strong> ${vehicle.description}<br>
                    <strong>Date:</strong> ${vehicle.date}<br>
                    <strong>Status:</strong> ${vehicle.status}
                </div>
            `;
            
            this.reset();
            document.getElementById('insertDate').valueAsDate = new Date();
            
            console.log('Vehicle inserted:', vehicle);
            console.log('All vehicles:', vehicles);
        });

        // Update Vehicle Form Handler
        document.getElementById('updateForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const id = parseInt(document.getElementById('updateId').value);
            const newName = document.getElementById('updateName').value;
            const newStatus = document.getElementById('updateStatus').value;
            
            const vehicle = vehicles.find(v => v.id === id);
            const resultDiv = document.getElementById('updateResult');
            
            if (vehicle) {
                vehicle.name = newName;
                vehicle.status = newStatus;
                
                resultDiv.className = 'result success';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <strong>✅ Vehicle Updated Successfully!</strong><br>
                    <div class="vehicle-item" style="margin-top: 10px;">
                        <strong>ID:</strong> ${vehicle.id}<br>
                        <strong>Updated Name:</strong> ${vehicle.name}<br>
                        <strong>Updated Status:</strong> ${vehicle.status}<br>
                        <strong>Description:</strong> ${vehicle.description}<br>
                        <strong>Date:</strong> ${vehicle.date}
                    </div>
                `;
                
                console.log('Vehicle updated:', vehicle);
            } else {
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<strong>❌ Error:</strong> Vehicle with ID ${id} not found!<br><small>Please insert a vehicle first.</small>`;
            }
            
            this.reset();
        });
    </script>
</body>
</html>
